# Serves the built SPA and reverse-proxies the API so the browser uses one
# origin (no CORS, no SPA base-URL config, no Go code change). "api" is the
# backend service name on the compose network, listening on 4523.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: serve real files, otherwise fall back to the app
    # shell so deep links (e.g. /projects/<id>) resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API. proxy_pass without a URI path forwards the request URI unchanged,
    # so /api/projects -> http://api:4523/api/projects.
    location /api/ {
        proxy_pass http://api:4523;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint, also used by the compose healthcheck on this service.
    location = /health {
        proxy_pass http://api:4523;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # MCP over HTTP.
    #
    # CAVEAT (known limitation - deliberately not fixed here): the backend's
    # go-sdk StreamableHTTPHandler enables DNS-rebinding protection by default,
    # which CAN reject /mcp with 403 when the request's Host is non-loopback (as
    # it is behind a proxy). We intentionally do not change the Go code to opt out
    # (DisableLocalhostProtection). With the current go-sdk version this proxy path
    # was verified to work (/mcp returns valid JSON-RPC), but treat it as a
    # version-dependent risk: if /mcp starts 403ing through the proxy, reach the
    # api service directly via a loopback Host instead. /api and /health are
    # unaffected. See README (Docker) and CLAUDE.md (Container).
    location /mcp {
        proxy_pass http://api:4523;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
